<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%" role="img" aria-labelledby="apTitle apDesc">
  <title id="apTitle">音频流水线 - 加载音频 → 流式响应 → 浏览器缓冲 → 解码播放 → 可视化</title>
  <desc id="apDesc">音频流水线示意图。五个阶段横向排列:加载音频(MusicController 路由)、流式响应(SpringBoot Range 输出)、浏览器缓冲(HTML5 audio)、解码播放(audio element)、可视化(TweenLite 波形动效),阶段间以箭头连接,每阶段下方为职责说明。</desc>

  <defs>
    <marker id="apArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B6B7E"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="1200" height="320" rx="20" fill="#1A0F1F"/>

  <!-- Title -->
  <g transform="translate(56 44)">
    <line x1="0" y1="-12" x2="56" y2="-12" stroke="#C97064" stroke-width="2"/>
    <text x="0" y="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#E8E4D9">音频流水线</text>
    <text x="172" y="14" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#6B6B7E">从请求到可视化</text>
  </g>

  <!-- Stage nodes row at y=120, height 88, width 168 -->
  <!-- Node 1: 加载音频 -->
  <g transform="translate(84 120)">
    <rect x="0" y="0" width="168" height="88" rx="12" fill="#221628" stroke="#C97064" stroke-width="1"/>
    <!-- Upload/request icon -->
    <g transform="translate(20 22)" fill="none" stroke="#C97064" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 8 16 L 8 4 M 4 8 L 8 4 L 12 8"/>
      <path d="M 2 18 L 14 18" stroke="#6B6B7E"/>
    </g>
    <text x="48" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#E8E4D9">加载音频</text>
    <text x="48" y="56" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#7C5CFF">/music route</text>
    <text x="48" y="72" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#6B6B7E">HTTP GET</text>
  </g>
  <line x1="252" y1="164" x2="300" y2="164" stroke="#6B6B7E" stroke-width="1.5" marker-end="url(#apArrow)"/>

  <!-- Node 2: 流式响应 -->
  <g transform="translate(300 120)">
    <rect x="0" y="0" width="168" height="88" rx="12" fill="#221628" stroke="#7C5CFF" stroke-width="1"/>
    <!-- Stream icon -->
    <g transform="translate(20 22)" fill="none" stroke="#7C5CFF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 0 6 L 16 6"/>
      <path d="M 2 11 L 14 11"/>
      <path d="M 4 16 L 12 16"/>
    </g>
    <text x="48" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#E8E4D9">流式响应</text>
    <text x="48" y="56" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#7C5CFF">Range output</text>
    <text x="48" y="72" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#6B6B7E">Spring Boot</text>
  </g>
  <line x1="468" y1="164" x2="516" y2="164" stroke="#6B6B7E" stroke-width="1.5" marker-end="url(#apArrow)"/>

  <!-- Node 3: 浏览器缓冲 -->
  <g transform="translate(516 120)">
    <rect x="0" y="0" width="168" height="88" rx="12" fill="#221628" stroke="#7C5CFF" stroke-width="1"/>
    <!-- Buffer icon -->
    <g transform="translate(20 22)" fill="none" stroke="#7C5CFF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="4" width="4" height="12" rx="1"/>
      <rect x="6" y="2" width="4" height="16" rx="1"/>
      <rect x="12" y="6" width="4" height="10" rx="1"/>
    </g>
    <text x="48" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#E8E4D9">浏览器缓冲</text>
    <text x="48" y="56" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#7C5CFF">audio buffer</text>
    <text x="48" y="72" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#6B6B7E">HTML5 element</text>
  </g>
  <line x1="684" y1="164" x2="732" y2="164" stroke="#6B6B7E" stroke-width="1.5" marker-end="url(#apArrow)"/>

  <!-- Node 4: 解码播放 -->
  <g transform="translate(732 120)">
    <rect x="0" y="0" width="168" height="88" rx="12" fill="#221628" stroke="#C97064" stroke-width="1"/>
    <!-- Play icon -->
    <g transform="translate(20 22)">
      <circle cx="10" cy="10" r="10" fill="none" stroke="#C97064" stroke-width="1.6"/>
      <path d="M 7 5 L 7 15 L 14 10 Z" fill="#C97064"/>
    </g>
    <text x="48" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#E8E4D9">解码播放</text>
    <text x="48" y="56" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#7C5CFF">decode + play</text>
    <text x="48" y="72" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#6B6B7E">audio API</text>
  </g>
  <line x1="900" y1="164" x2="948" y2="164" stroke="#6B6B7E" stroke-width="1.5" marker-end="url(#apArrow)"/>

  <!-- Node 5: 可视化 -->
  <g transform="translate(948 120)">
    <rect x="0" y="0" width="168" height="88" rx="12" fill="#221628" stroke="#7C5CFF" stroke-width="1"/>
    <!-- Waveform icon -->
    <g transform="translate(20 22)" fill="#7C5CFF">
      <rect x="0" y="8" width="2.5" height="8" rx="1"/>
      <rect x="5" y="4" width="2.5" height="16" rx="1"/>
      <rect x="10" y="0" width="2.5" height="24" rx="1"/>
      <rect x="15" y="6" width="2.5" height="12" rx="1"/>
    </g>
    <text x="48" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#E8E4D9">可视化</text>
    <text x="48" y="56" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#7C5CFF">TweenLite wave</text>
    <text x="48" y="72" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#6B6B7E">jQuery render</text>
  </g>

  <!-- Role descriptions below each node -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#6B6B7E">
    <text x="84" y="240">MusicController 提供</text>
    <text x="84" y="258">列表 / 上传 / 播放路由</text>

    <text x="300" y="240">服务端按 Range 分片</text>
    <text x="300" y="258">输出音频字节流</text>

    <text x="516" y="240">浏览器 audio 元素</text>
    <text x="516" y="258">边下边播,边播边缓冲</text>

    <text x="732" y="240">原生解码 + 播放控件</text>
    <text x="732" y="258">进度条 / 暂停 / 跳转</text>

    <text x="948" y="240">TweenLite 驱动</text>
    <text x="948" y="258">实时波形动效</text>
  </g>

  <!-- Bottom note -->
  <text x="1144" y="296" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#6B6B7E">后端 SpringBoot 流式 · 前端 HTML5 audio + TweenLite</text>
</svg>
