<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="100%" role="img" aria-labelledby="pfTitle pfDesc">
  <title id="pfTitle">歌单流程 - 添加 → 排序 → 播放 → 切歌</title>
  <desc id="pfDesc">歌单流程示意图。四个阶段横向排列:添加(上传音乐入库)、排序(列表展示与排序)、播放(选中曲目播放)、切歌(上一首 / 下一首切换),阶段间以箭头连接,每阶段下方为职责说明。</desc>

  <defs>
    <marker id="pfArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B6B7E"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="1200" height="280" rx="20" fill="#1A0F1F"/>

  <!-- Title -->
  <g transform="translate(56 44)">
    <line x1="0" y1="-12" x2="56" y2="-12" stroke="#C97064" stroke-width="2"/>
    <text x="0" y="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#E8E4D9">歌单流程</text>
    <text x="172" y="14" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#6B6B7E">从入库到切歌的完整路径</text>
  </g>

  <!-- Flow nodes row at y=110, height 88, width 220 -->
  <!-- Node 1: 添加 -->
  <g transform="translate(70 110)">
    <rect x="0" y="0" width="220" height="88" rx="12" fill="#221628" stroke="#C97064" stroke-width="1"/>
    <g transform="translate(24 26)" fill="none" stroke="#C97064" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 18 4 L 4 4 L 4 28 L 18 28" transform="translate(2 -2)"/>
      <path d="M 16 14 L 28 14 M 22 8 L 28 14 L 22 20"/>
    </g>
    <text x="68" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#E8E4D9">添加</text>
    <text x="68" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#7C5CFF">upload into library</text>
  </g>
  <line x1="290" y1="154" x2="350" y2="154" stroke="#6B6B7E" stroke-width="1.5" marker-end="url(#pfArrow)"/>

  <!-- Node 2: 排序 -->
  <g transform="translate(350 110)">
    <rect x="0" y="0" width="220" height="88" rx="12" fill="#221628" stroke="#7C5CFF" stroke-width="1"/>
    <g transform="translate(24 26)" fill="none" stroke="#7C5CFF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 4 6 L 28 6"/>
      <path d="M 4 16 L 22 16"/>
      <path d="M 4 26 L 16 26"/>
    </g>
    <text x="68" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#E8E4D9">排序</text>
    <text x="68" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#7C5CFF">list view + order</text>
  </g>
  <line x1="570" y1="154" x2="630" y2="154" stroke="#6B6B7E" stroke-width="1.5" marker-end="url(#pfArrow)"/>

  <!-- Node 3: 播放 -->
  <g transform="translate(630 110)">
    <rect x="0" y="0" width="220" height="88" rx="12" fill="#221628" stroke="#C97064" stroke-width="1"/>
    <g transform="translate(24 26)">
      <circle cx="14" cy="14" r="14" fill="none" stroke="#C97064" stroke-width="1.6"/>
      <path d="M 10 7 L 10 21 L 18 14 Z" fill="#C97064"/>
    </g>
    <text x="68" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#E8E4D9">播放</text>
    <text x="68" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#7C5CFF">select + play</text>
  </g>
  <line x1="850" y1="154" x2="910" y2="154" stroke="#6B6B7E" stroke-width="1.5" marker-end="url(#pfArrow)"/>

  <!-- Node 4: 切歌 -->
  <g transform="translate(910 110)">
    <rect x="0" y="0" width="220" height="88" rx="12" fill="#221628" stroke="#7C5CFF" stroke-width="1"/>
    <g transform="translate(24 26)" fill="#E8E4D9">
      <path d="M 0 6 L 12 14 L 0 22 Z"/>
      <path d="M 16 6 L 28 14 L 16 22 Z"/>
    </g>
    <text x="68" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#E8E4D9">切歌</text>
    <text x="68" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#7C5CFF">prev / next switch</text>
  </g>

  <!-- Role descriptions below each node -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#6B6B7E">
    <text x="70" y="226">上传音乐文件入库</text>
    <text x="70" y="244">写入 music_player 库</text>

    <text x="350" y="226">列表展示与排序</text>
    <text x="350" y="244">Thymeleaf 渲染列表</text>

    <text x="630" y="226">点击选中并播放</text>
    <text x="630" y="244">HTML5 audio 接管</text>

    <text x="910" y="226">上一首 / 下一首</text>
    <text x="910" y="244">循环或随机切换</text>
  </g>
</svg>
