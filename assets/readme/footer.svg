<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100" width="100%" role="img" aria-labelledby="ftTitle ftDesc">
  <title id="ftTitle">README 签名 - 作者 liem · 基于 Spring Boot 构建</title>
  <desc id="ftDesc">README 页脚签名。左侧为 README MADE WITH 标签、一组电紫音频波形 motif 与项目名 音乐播放器;右侧为作者 liem 与技术栈说明。波形 motif 呼应项目播放器主题。</desc>

  <!-- Canvas -->
  <rect x="0" y="0" width="1200" height="100" rx="16" fill="#1A0F1F"/>

  <!-- Top divider -->
  <line x1="56" y1="36" x2="1144" y2="36" stroke="#2A1F35" stroke-width="1"/>

  <!-- Left: signature with waveform motif -->
  <g transform="translate(56 56)">
    <text x="0" y="14" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#6B6B7E">README MADE WITH</text>
    <!-- Waveform motif -->
    <g transform="translate(168 4)" fill="#7C5CFF">
      <rect x="0"  y="6" width="3" height="8" rx="1"/>
      <rect x="8"  y="2" width="3" height="16" rx="1"/>
      <rect x="16" y="0" width="3" height="20" rx="1"/>
      <rect x="24" y="4" width="3" height="12" rx="1"/>
      <rect x="32" y="8" width="3" height="6" rx="1"/>
      <rect x="40" y="2" width="3" height="16" rx="1"/>
      <rect x="48" y="6" width="3" height="8" rx="1"/>
    </g>
    <text x="224" y="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#E8E4D9">音乐播放器</text>
  </g>

  <!-- Right: author + tech -->
  <g transform="translate(1144 56)">
    <text x="0" y="14" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#6B6B7E">作者 liem · Spring Boot · MyBatis · MySQL 9.4</text>
    <text x="0" y="32" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#6B6B7E">Thymeleaf · Bootstrap · jQuery · TweenLite</text>
  </g>
</svg>
