<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 140" width="100%" role="img" aria-labelledby="featTitle featDesc">
  <title id="featTitle">功能与播放能力</title>
  <desc id="featDesc">功能章节头。左侧为章节标题 功能与播放能力 与一句说明 覆盖上传、在线播放、收藏与对外 API 的完整闭环;右侧为一组电紫音频波形 motif,呼应项目主题。</desc>

  <defs>
