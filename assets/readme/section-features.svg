      <stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0.90"/>
    </linearGradient>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="1200" height="140" rx="16" fill="#1A0F1F"/>

