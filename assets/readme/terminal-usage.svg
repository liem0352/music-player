<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%" role="img" aria-labelledby="tuTitle tuDesc">
  <title id="tuTitle">快速启动 - 数据库导入、Maven 启动与本地访问</title>
  <desc id="tuDesc">终端命令卡片。三行命令依次:用 mysql 导入 db.sql 表结构与数据、用 mvn spring-boot:run 启动 Spring Boot 服务、浏览器访问登录页与音乐列表页。命令为本项目真实启动流程。</desc>

  <!-- Canvas -->
  <rect x="0" y="0" width="1200" height="200" rx="16" fill="#1A0F1F"/>

  <!-- Terminal panel -->
  <g transform="translate(48 24)">
    <rect x="0" y="0" width="1104" height="152" rx="12" fill="#120917" stroke="#2A1F35" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="1104" height="32" rx="12" fill="#221628"/>
    <rect x="0" y="20" width="1104" height="12" fill="#221628"/>
    <text x="20" y="21" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="1.5" fill="#6B6B7E">SHELL · 快速启动</text>
    <text x="1084" y="21" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#6B6B7E">music-player /</text>

    <!-- Command 1: db import -->
    <g transform="translate(20 60)">
      <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#C97064">$</text>
      <text x="20" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#E8E4D9">mysql -u root -p music_player &lt; db.sql</text>
      <text x="540" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#6B6B7E"># 导入表结构与初始数据</text>
    </g>

    <!-- Command 2: maven run -->
    <g transform="translate(20 92)">
      <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#C97064">$</text>
      <text x="20" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#E8E4D9">mvn spring-boot:run</text>
      <text x="540" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#6B6B7E"># 启动 Spring Boot 服务</text>
    </g>

    <!-- Command 3: access -->
    <g transform="translate(20 124)">
      <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#7C5CFF">→</text>
      <text x="20" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#7C5CFF">http://localhost:8080/login.html</text>
      <text x="540" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#6B6B7E"># 登录页 · 列表 /list.html</text>
    </g>
  </g>
</svg>
