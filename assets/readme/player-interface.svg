<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="100%" role="img" aria-labelledby="piTitle piDesc">
  <title id="piTitle">播放器界面解剖 - 进度条 / 播放控制 / 音量 / 歌单 / 可视化区</title>
  <desc id="piDesc">播放器界面解剖图。中央为播放器面板,含专辑封面、曲目信息、电紫音频可视化区、带时间标签的进度条、播放控制按钮组(随机、上一首、播放、下一首、循环)、音量滑条与右侧歌单。五个区域以引线标注:可视化区、进度条、播放控制、音量、歌单。</desc>

  <defs>
    <linearGradient id="piWave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#7C5CFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="piAlbum" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A1F35"/>
      <stop offset="100%" stop-color="#1A0F1F"/>
    </linearGradient>
    <marker id="piDot" viewBox="0 0 6 6" refX="3" refY="3" markerWidth="6" markerHeight="6">
      <circle cx="3" cy="3" r="2" fill="#6B6B7E"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="1200" height="360" rx="20" fill="#1A0F1F"/>

  <!-- Player panel -->
  <g transform="translate(48 60)">
    <rect x="0" y="0" width="1104" height="240" rx="14" fill="#221628" stroke="#2A1F35" stroke-width="1"/>

    <!-- Album cover -->
    <g transform="translate(28 28)">
      <rect x="0" y="0" width="100" height="100" rx="10" fill="url(#piAlbum)" stroke="#2A1F35" stroke-width="1"/>
      <circle cx="50" cy="50" r="34" fill="none" stroke="#2A1F35" stroke-width="1"/>
      <circle cx="50" cy="50" r="22" fill="#C97064"/>
      <path d="M 44 40 L 44 60 L 60 50 Z" fill="#1A0F1F"/>
    </g>

    <!-- Track info -->
    <g transform="translate(148 40)">
      <text x="0" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="1.5" fill="#6B6B7E">NOW PLAYING</text>
      <text x="0" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="600" fill="#E8E4D9">深夜电台 · Demo Track</text>
      <text x="0" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#6B6B7E">liem · Spring Boot Music Player</text>
    </g>

    <!-- Visualizer area (right of track info) -->
    <g transform="translate(148 130)" fill="url(#piWave)">
      <rect x="0"   y="14" width="4" height="8"  rx="1"/>
      <rect x="12"  y="10" width="4" height="16" rx="1"/>
      <rect x="24"  y="4"  width="4" height="28" rx="1"/>
      <rect x="36"  y="12" width="4" height="12" rx="1"/>
      <rect x="48"  y="2"  width="4" height="32" rx="1"/>
      <rect x="60"  y="8"  width="4" height="20" rx="1"/>
      <rect x="72"  y="0"  width="4" height="36" rx="1"/>
      <rect x="84"  y="6"  width="4" height="24" rx="1"/>
      <rect x="96"  y="12" width="4" height="12" rx="1"/>
      <rect x="108" y="4"  width="4" height="28" rx="1"/>
      <rect x="120" y="10" width="4" height="16" rx="1"/>
      <rect x="132" y="0"  width="4" height="36" rx="1"/>
      <rect x="144" y="8"  width="4" height="20" rx="1"/>
      <rect x="156" y="14" width="4" height="8"  rx="1"/>
      <rect x="168" y="6"  width="4" height="24" rx="1"/>
      <rect x="180" y="2"  width="4" height="32" rx="1"/>
      <rect x="192" y="10" width="4" height="16" rx="1"/>
      <rect x="204" y="14" width="4" height="8"  rx="1"/>
      <rect x="216" y="8"  width="4" height="20" rx="1"/>
      <rect x="228" y="12" width="4" height="12" rx="1"/>
      <rect x="240" y="4"  width="4" height="28" rx="1"/>
      <rect x="252" y="10" width="4" height="16" rx="1"/>
      <rect x="264" y="0"  width="4" height="36" rx="1"/>
      <rect x="276" y="8"  width="4" height="20" rx="1"/>
      <rect x="288" y="14" width="4" height="8"  rx="1"/>
      <rect x="300" y="6"  width="4" height="24" rx="1"/>
      <rect x="312" y="12" width="4" height="12" rx="1"/>
      <rect x="324" y="2"  width="4" height="32" rx="1"/>
      <rect x="336" y="10" width="4" height="16" rx="1"/>
      <rect x="348" y="14" width="4" height="8"  rx="1"/>
      <rect x="360" y="8"  width="4" height="20" rx="1"/>
      <rect x="372" y="4"  width="4" height="28" rx="1"/>
      <rect x="384" y="12" width="4" height="12" rx="1"/>
      <rect x="396" y="14" width="4" height="8"  rx="1"/>
      <rect x="408" y="10" width="4" height="16" rx="1"/>
      <rect x="420" y="6"  width="4" height="24" rx="1"/>
      <rect x="432" y="14" width="4" height="8"  rx="1"/>
      <rect x="444" y="12" width="4" height="12" rx="1"/>
      <rect x="456" y="8"  width="4" height="20" rx="1"/>
      <rect x="468" y="14" width="4" height="8"  rx="1"/>
    </g>

    <!-- Progress bar with time labels -->
    <g transform="translate(148 188)">
      <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#7C5CFF">00:42</text>
      <line x1="40" y1="-4" x2="760" y2="-4" stroke="#2A1F35" stroke-width="2" stroke-linecap="round"/>
      <line x1="40" y1="-4" x2="306" y2="-4" stroke="#7C5CFF" stroke-width="2" stroke-linecap="round"/>
      <circle cx="306" cy="-4" r="5" fill="#C97064"/>
      <text x="800" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#6B6B7E">03:18</text>
    </g>

    <!-- Control buttons row -->
    <g transform="translate(280 214)">
      <!-- Shuffle -->
      <g transform="translate(0 0)" stroke="#6B6B7E" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 0 4 L 3 4 L 11 12 L 14 12 M 11 4 L 14 4 L 14 7 M 0 12 L 3 12 L 6.5 9.5"/>
        <path d="M 12 3 L 14 4 L 12 6"/>
        <path d="M 12 11 L 14 12 L 12 13"/>
      </g>
      <!-- Previous -->
      <g transform="translate(40 0)" fill="#E8E4D9">
        <rect x="0" y="2" width="3" height="12" rx="1"/>
        <path d="M 4 8 L 14 2 L 14 14 Z"/>
      </g>
      <!-- Play (primary, brick red) -->
      <g transform="translate(78 -4)">
        <circle cx="10" cy="10" r="12" fill="#C97064"/>
        <path d="M 7 5 L 7 15 L 14 10 Z" fill="#1A0F1F"/>
      </g>
      <!-- Next -->
      <g transform="translate(118 0)" fill="#E8E4D9">
        <path d="M 0 2 L 10 8 L 0 14 Z"/>
        <rect x="11" y="2" width="3" height="12" rx="1"/>
      </g>
      <!-- Loop -->
      <g transform="translate(158 0)" stroke="#6B6B7E" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 0 6 L 0 4 L 12 4 M 9 1 L 12 4 L 9 7"/>
        <path d="M 12 10 L 12 12 L 0 12 M 3 9 L 0 12 L 3 15"/>
      </g>
    </g>

    <!-- Volume slider -->
    <g transform="translate(840 218)">
      <!-- Speaker icon -->
      <g transform="translate(0 0)" fill="#6B6B7E" stroke="#6B6B7E" stroke-width="1.4" stroke-linejoin="round">
        <path d="M 0 4 L 4 4 L 9 0 L 9 16 L 4 12 L 0 12 Z" fill="#6B6B7E" stroke="none"/>
        <path d="M 12 5 C 14 7 14 9 12 11" fill="none"/>
      </g>
      <line x1="22" y1="8" x2="120" y2="8" stroke="#2A1F35" stroke-width="2" stroke-linecap="round"/>
      <line x1="22" y1="8" x2="78" y2="8" stroke="#E8E4D9" stroke-width="2" stroke-linecap="round"/>
      <circle cx="78" cy="8" r="4" fill="#E8E4D9"/>
    </g>

    <!-- Playlist panel (right) -->
    <g transform="translate(980 28)">
      <rect x="0" y="0" width="96" height="184" rx="8" fill="#1A0F1F" stroke="#2A1F35" stroke-width="1"/>
      <text x="12" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" letter-spacing="1" fill="#6B6B7E">PLAYLIST</text>
      <!-- active track -->
      <rect x="8" y="30" width="80" height="20" rx="4" fill="#2A1F35"/>
      <rect x="14" y="37" width="4" height="6" fill="#7C5CFF"/>
      <text x="24" y="43" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#E8E4D9">深夜电台</text>
      <!-- other tracks -->
      <text x="14" y="63" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#6B6B7E">雨夜长诗</text>
      <text x="14" y="83" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#6B6B7E">归途信号</text>
      <text x="14" y="103" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#6B6B7E">北纬四十八</text>
      <text x="14" y="123" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#6B6B7E">潮汐练习</text>
      <text x="14" y="143" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#6B6B7E">慢速公路</text>
      <text x="14" y="163" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#6B6B7E">纸飞机</text>
    </g>
  </g>

  <!-- Callouts (top) -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#C97064">
    <!-- 可视化区 -->
    <text x="200" y="38">可视化区</text>
    <text x="200" y="54" font-size="11" fill="#6B6B7E">实时音频波形 · TweenLite 动效</text>
    <line x1="240" y1="60" x2="240" y2="78" stroke="#6B6B7E" stroke-width="1" stroke-dasharray="2 3"/>

    <!-- 进度条 -->
    <text x="560" y="38">进度条</text>
    <text x="560" y="54" font-size="11" fill="#6B6B7E">拖拽定位 · 时间双标</text>
    <line x1="600" y1="60" x2="600" y2="74" stroke="#6B6B7E" stroke-width="1" stroke-dasharray="2 3"/>

    <!-- 歌单 -->
    <text x="1010" y="38">歌单</text>
    <text x="1010" y="54" font-size="11" fill="#6B6B7E">当前曲目列表 · 高亮焦点</text>
    <line x1="1028" y1="60" x2="1028" y2="86" stroke="#6B6B7E" stroke-width="1" stroke-dasharray="2 3"/>
  </g>

  <!-- Callouts (bottom) -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#C97064">
    <!-- 播放控制 -->
    <text x="320" y="338">播放控制</text>
    <text x="320" y="354" font-size="11" fill="#6B6B7E">随机 · 上一首 · 播放 · 下一首 · 循环</text>
    <line x1="372" y1="326" x2="372" y2="304" stroke="#6B6B7E" stroke-width="1" stroke-dasharray="2 3"/>

    <!-- 音量 -->
    <text x="870" y="338">音量</text>
    <text x="870" y="354" font-size="11" fill="#6B6B7E">滑条调节 · 静音收起</text>
    <line x1="894" y1="326" x2="894" y2="304" stroke="#6B6B7E" stroke-width="1" stroke-dasharray="2 3"/>
  </g>
</svg>
