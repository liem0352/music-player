<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%" role="img" aria-labelledby="fmTitle fmDesc">
  <title id="fmTitle">功能矩阵 - 播放控制与项目核心能力</title>
  <desc id="fmDesc">功能矩阵图。四列两行共八个功能单元:播放/暂停、上一首、下一首、循环、随机、上传、收藏、对外 API。每单元含图标、中文名与一行职责说明,均为项目中真实存在的功能。</desc>

  <!-- Canvas -->
  <rect x="0" y="0" width="1200" height="320" rx="20" fill="#1A0F1F"/>

  <!-- Title -->
  <g transform="translate(56 44)">
    <line x1="0" y1="-12" x2="56" y2="-12" stroke="#C97064" stroke-width="2"/>
    <text x="0" y="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#E8E4D9">功能矩阵</text>
    <text x="172" y="14" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#6B6B7E">播放控制与项目核心能力</text>
  </g>

  <!-- Grid: 4 cols x 2 rows. Cell 240x88, gap 24. Start x=84. Row1 y=96, Row2 y=200 -->
  <!-- Row 1 -->
  <!-- Cell 1: 播放/暂停 -->
  <g transform="translate(84 96)">
    <rect x="0" y="0" width="240" height="88" rx="12" fill="#221628" stroke="#2A1F35" stroke-width="1"/>
    <g transform="translate(20 28)">
      <circle cx="16" cy="16" r="16" fill="none" stroke="#C97064" stroke-width="1.6"/>
      <path d="M 11 9 L 11 23 L 19 16 Z" fill="#C97064"/>
    </g>
    <text x="64" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600" fill="#E8E4D9">播放 / 暂停</text>
    <text x="64" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#7C5CFF">audio.play() toggle</text>
  </g>

  <!-- Cell 2: 上一首 -->
  <g transform="translate(348 96)">
    <rect x="0" y="0" width="240" height="88" rx="12" fill="#221628" stroke="#2A1F35" stroke-width="1"/>
    <g transform="translate(20 28)" fill="#E8E4D9">
      <rect x="0" y="4" width="4" height="24" rx="1"/>
      <path d="M 6 16 L 22 4 L 22 28 Z"/>
    </g>
    <text x="64" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600" fill="#E8E4D9">上一首</text>
    <text x="64" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#7C5CFF">prev track</text>
  </g>

  <!-- Cell 3: 下一首 -->
  <g transform="translate(612 96)">
    <rect x="0" y="0" width="240" height="88" rx="12" fill="#221628" stroke="#2A1F35" stroke-width="1"/>
    <g transform="translate(20 28)" fill="#E8E4D9">
      <path d="M 0 4 L 16 16 L 0 28 Z"/>
      <rect x="18" y="4" width="4" height="24" rx="1"/>
    </g>
    <text x="64" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600" fill="#E8E4D9">下一首</text>
    <text x="64" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#7C5CFF">next track</text>
  </g>

  <!-- Cell 4: 循环 -->
  <g transform="translate(876 96)">
    <rect x="0" y="0" width="240" height="88" rx="12" fill="#221628" stroke="#2A1F35" stroke-width="1"/>
    <g transform="translate(20 28)" fill="none" stroke="#E8E4D9" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 2 12 L 2 8 L 22 8 M 18 4 L 22 8 L 18 12"/>
      <path d="M 22 20 L 22 24 L 2 24 M 6 20 L 2 24 L 6 28" transform="translate(0 -4)"/>
    </g>
    <text x="64" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600" fill="#E8E4D9">循环</text>
    <text x="64" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#7C5CFF">loop mode</text>
  </g>

  <!-- Row 2 -->
  <!-- Cell 5: 随机 -->
  <g transform="translate(84 200)">
    <rect x="0" y="0" width="240" height="88" rx="12" fill="#221628" stroke="#2A1F35" stroke-width="1"/>
    <g transform="translate(20 28)" fill="none" stroke="#E8E4D9" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 2 6 L 6 6 L 18 22 L 22 22 M 18 6 L 22 6 L 22 10 M 2 22 L 6 22 L 10 17"/>
      <path d="M 20 4 L 22 6 L 20 8"/>
      <path d="M 20 20 L 22 22 L 20 24"/>
    </g>
    <text x="64" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600" fill="#E8E4D9">随机</text>
    <text x="64" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#7C5CFF">shuffle order</text>
  </g>

  <!-- Cell 6: 上传 -->
  <g transform="translate(348 200)">
    <rect x="0" y="0" width="240" height="88" rx="12" fill="#221628" stroke="#C97064" stroke-width="1"/>
    <g transform="translate(20 28)" fill="none" stroke="#C97064" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 16 22 L 16 8 M 11 13 L 16 8 L 21 13"/>
      <path d="M 4 26 L 28 26" stroke="#6B6B7E"/>
    </g>
    <text x="64" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600" fill="#E8E4D9">上传</text>
    <text x="64" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#7C5CFF">multipart upload</text>
  </g>

  <!-- Cell 7: 收藏 -->
  <g transform="translate(612 200)">
    <rect x="0" y="0" width="240" height="88" rx="12" fill="#221628" stroke="#C97064" stroke-width="1"/>
    <g transform="translate(22 28)">
      <path d="M 16 28 C 16 28 2 18 2 10 C 2 5.6 5.6 2 10 2 C 12.8 2 15 3.6 16 6 C 17 3.6 19.2 2 22 2 C 26.4 2 30 5.6 30 10 C 30 18 16 28 16 28 Z" fill="#C97064"/>
    </g>
    <text x="64" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600" fill="#E8E4D9">收藏</text>
    <text x="64" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#7C5CFF">love music</text>
  </g>

  <!-- Cell 8: 对外 API -->
  <g transform="translate(876 200)">
    <rect x="0" y="0" width="240" height="88" rx="12" fill="#221628" stroke="#7C5CFF" stroke-width="1"/>
    <g transform="translate(20 28)" fill="none" stroke="#7C5CFF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 8 4 L 4 4 L 4 28 L 8 28"/>
      <path d="M 24 4 L 28 4 L 28 28 L 24 28"/>
      <path d="M 12 16 L 20 16 M 17 13 L 20 16 L 17 19"/>
    </g>
    <text x="64" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600" fill="#E8E4D9">对外 API</text>
    <text x="64" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#7C5CFF">RESTful /api</text>
  </g>
</svg>
