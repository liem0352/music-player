# 配置 mysql 驱动
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/onlinemusic?characterEncoding=utf8&useSSL=false
    username: root
    password: ${DB_PASSWORD:your_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

# 开启 mybatis sql 日志打印
logging:
  level:
    com:
      example:
        demo: debug
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


private:
  key:
    url: ${PRIVATE_KEY_PATH:/path/to/private.txt}

public:
  key:
    url: ${PUBLIC_KEY_PATH:/path/to/public.txt}

# 音乐文件存放在服务器上的位置
music:
  path: ${MUSIC_PATH:/path/to/music/}
